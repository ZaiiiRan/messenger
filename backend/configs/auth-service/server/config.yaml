grpc_server:
  port: ":50051"
metrics_server:
  port: ":8080"
shutdown:
  shutdown_timeout: 5
jwt:
  access_token_ttl: 900
  refresh_token_ttl: 86400
user_service_grpc_client:
  auto_connect: true
vault:
  path: "secret/data/auth-service"
email_codes_tasks_producer:
  topic: "email-codes-tasks"
  client_id: "auth-service"
  batch_size: 100
  write_timeout: 10

