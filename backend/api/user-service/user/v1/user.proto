syntax = "proto3";

package user.v1;

option go_package = "user-service/gen/go/user;user";

service UserService {
    rpc GetUser(GetUserRequest) returns (GetUserResponse);
}

message GetUserRequest {
    string user_id = 1;
    string email = 2;
}

message GetUserResponse {
    string user_id = 1;
    string name = 2;
    string email = 3;
}
