syntax = "proto3";

package user.v1;

option go_package = "user-service/gen/go/user;user";

service UserService {
    rpc CreateUser(CreateUserRequest) returns (CreateUserResponse);
    rpc ConfirmUser(ConfirmUserRequest) returns (ConfirmUserResponse);
    rpc UpdateUserEmail(UpdateUserEmailRequest) returns (UpdateUserEmailResponse);
    rpc GetUserByID(GetUserByIDRequest) returns (GetUserByIDResponse);
    rpc GetUserByUsername(GetUserByUsernameRequest) returns (GetUserByUsernameResponse);
    rpc GetUserByEmail(GetUserByEmailRequest) returns (GetUserByEmailResponse);
    rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);

    rpc GetMeByUser(GetMeByUserRequest) returns (GetMeByUserResponse);
    rpc UpdateMeByUser(UpdateMeByUserRequest) returns (UpdateMeByUserResponse);
    rpc UpdateMyPrivacySettingsByUser(UpdateMyPrivacySettingsByUserRequest) returns (UpdateMyPrivacySettingsByUserResponse);
    rpc DeleteMeByUser(DeleteMeByUserRequest) returns (DeleteMeByUserResponse);

    rpc BanUser(BanUserRequest) returns (BanUserResponse);
    rpc UnbanUser(UnbanUserRequest) returns (UnbanUserResponse);
}

message Profile {
    string first_name = 1;
    string last_name = 2;
    optional string phone = 3;
    optional string birthdate = 4;
    optional string bio = 5;
}

message UserStatus {
    bool is_confirmed = 1;
    bool is_permanently_banned = 2;
    optional string banned_until = 3;
    bool is_deleted = 4;
    optional string deleted_at = 5;
    string email_updated_at = 6;
}

message UserPrivacySetting {
    string value = 1;
    repeated string favourites = 2;
    repeated string exceptions = 3;
}

message UserPrivacySettings {
    UserPrivacySetting avatar = 1;
    UserPrivacySetting photos = 2;
    UserPrivacySetting phone_number = 3;
    UserPrivacySetting email = 4;
    UserPrivacySetting online_status = 5;
    UserPrivacySetting first_dialogs_init = 6;
    UserPrivacySetting group_chat_invites = 7;
}

message User {
    string id = 1;
    string username = 2;
    string email = 3;
    Profile profile = 4;
    UserStatus status = 5;
    UserPrivacySettings privacy_settings = 6;
}

message CreateUserRequest {
    string username = 1;
    string email = 2;
    Profile profile = 3;
}

message CreateUserResponse {
    User user = 1;
}

message ConfirmUserRequest {
    string user_id = 1;
}

message ConfirmUserResponse {
    User user = 1;
}

message UpdateUserEmailRequest {
    string user_id = 1;
    string new_email = 2;
}

message UpdateUserEmailResponse {
    User user = 1;
}

message GetUserByIDRequest {
    string user_id = 1;
    bool include_privacy_settings = 2;
}

message GetUserByIDResponse {
    User user = 1;
}

message GetUserByUsernameRequest {
    string username = 1;
    bool include_privacy_settings = 2;
}

message GetUserByUsernameResponse {
    User user = 1;
}

message GetUserByEmailRequest {
    string email = 1;
    bool include_privacy_settings = 3;
}

message GetUserByEmailResponse {
    User user = 1;
}

message GetUsersRequest {
    repeated string ids = 1;
    repeated string full_usernames = 2;
    repeated string partial_usernames = 3;
    repeated string full_emails = 4;
    repeated string partial_emails = 5;
    repeated string phone_numbers = 6;
    repeated string partial_names = 7;

    optional bool is_confirmed = 8;
    optional bool is_deleted = 9;
    optional bool is_permanently_deleted = 10;
    optional bool is_permanently_banned = 11;
    optional bool is_temporarily_banned = 12;

    int32 page = 13;
    int32 page_size = 14;

    optional string deleted_from = 15;
    optional string deleted_to = 16;
    optional string created_from = 17;
    optional string created_to = 18;
    optional string updated_from = 19;
    optional string updated_to = 20;
    optional string email_updated_from = 21;
    optional string email_updated_to = 22;
    
    bool include_privacy_settings = 23;
}

message GetUsersResponse {
    repeated User users = 1;
}

message BanUserRequest {
    string user_id = 1;
    optional string banned_until = 2;
    optional bool permanently_ban = 3;
}

message BanUserResponse {
    User user = 1;
}

message UnbanUserRequest {
    string user_id = 1;
}

message UnbanUserResponse {
    User user = 1;
}

message GetMeByUserRequest {
    bool include_privacy_settings = 1;
}

message GetMeByUserResponse {
    User user = 1;
}

message UpdateProfile {
    optional string first_name = 1;
    optional string last_name = 2;
    optional string phone = 3;
    optional string birthdate = 4;
    optional string bio = 5;
}

message UpdateUser {
    optional string username = 1;
    UpdateProfile profile = 2;
}

message UpdateMeByUserRequest {
    repeated string fields = 1;
    UpdateUser user = 2;
}

message UpdateMeByUserResponse {
    User user = 1;
}

message UpdateUserPrivacySetting {
    optional string value = 1;
    repeated string favourites = 2;
    repeated string exceptions = 3;
}

message UpdateUserPrivacySettings {
    UpdateUserPrivacySetting avatar = 1;
    UpdateUserPrivacySetting photos = 2;
    UpdateUserPrivacySetting phone_number = 3;
    UpdateUserPrivacySetting email = 4;
    UpdateUserPrivacySetting online_status = 5;
    UpdateUserPrivacySetting first_dialogs_init = 6;
    UpdateUserPrivacySetting group_chat_invites = 7;
}

message UpdateMyPrivacySettingsByUserRequest {
    repeated string fields = 1;
    UpdateUserPrivacySettings privacy_settings = 2;
}

message UpdateMyPrivacySettingsByUserResponse {
    UserPrivacySettings privacy_settings  = 1;
}

message DeleteMeByUserRequest {}
message DeleteMeByUserResponse {
    User user = 1;
}
