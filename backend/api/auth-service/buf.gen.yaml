version: v1

plugins:
  - name: go
    out: auth-service/gen/go
    opt:
      - paths=source_relative
      - Muser/v1/user.proto=github.com/ZaiiiRan/messenger/backend/auth-service/gen/go/user/v1
  - name: go-grpc
    out: auth-service/gen/go
    opt:
      - paths=source_relative
      - Muser/v1/user.proto=github.com/ZaiiiRan/messenger/backend/auth-service/gen/go/user/v1

  - name: go
    out: api-gateway/gen/go
    opt:
      - paths=source_relative
      - Muser/v1/user.proto=github.com/ZaiiiRan/messenger/backend/api-gateway/gen/go/user/v1
      - Mauth/v1/auth.proto=github.com/ZaiiiRan/messenger/backend/api-gateway/gen/go/auth/v1
  - name: go-grpc
    out: api-gateway/gen/go
    opt:
      - paths=source_relative
      - Muser/v1/user.proto=github.com/ZaiiiRan/messenger/backend/api-gateway/gen/go/user/v1
      - Mauth/v1/auth.proto=github.com/ZaiiiRan/messenger/backend/api-gateway/gen/go/auth/v1
