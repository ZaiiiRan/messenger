  user-db:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - user-db-data:/var/lib/postgresql/data/
    networks:
      - messenger-network
  
  user-redis:
    image: redis:8
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - messenger-network
  
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    depends_on:
      user-db:
        condition: service_healthy
      user-redis:
        condition: service_healthy
    environment:
      DB_CONNECTION_STRING: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/postgres?sslmode=disable
      MIGRATE_NEED_TO_MIGRATE: true
      REDIS_ADDRESS: user-redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - ./backend/configs/user-service:/etc/user-service
    ports:
      - "50051:50051"
    networks:
      - messenger-network

volumes:
  # old-messenger-db:
  user-db-data:

networks:
  messenger-network:
    driver: bridge