  vault:
    image: hashicorp/vault:1.19
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    cap_add:
      - IPC_LOCK
    command: server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://127.0.0.1:8200"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    ports:
      - "8200:8200"
    networks:
      - messenger-network
  
  user-db:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - user-db-data:/var/lib/postgresql/data/
    networks:
      - messenger-network
  
  user-redis:
    image: redis:8
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - messenger-network
  
  user-service:
    build:
      context: ./backend/user-service
      dockerfile: Dockerfile
    depends_on:
      user-db:
        condition: service_healthy
      user-redis:
        condition: service_healthy
      vault:
        condition: service_healthy
    environment:
      DB_CONNECTION_STRING: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@user-db:5432/postgres?sslmode=disable
      MIGRATE_NEED_TO_MIGRATE: true
      REDIS_ADDRESS: user-redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDRESS: http://vault:8200
      VAULT_ENABLE: true
    volumes:
      - ./backend/configs/user-service:/etc/user-service
    ports:
      - "50051:50051"
    networks:
      - messenger-network
  
  auth-db:
    image: postgres:18.3-alpine3.23
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - auth-db-data:/var/lib/postgresql/data/
    networks:
      - messenger-network
  
  auth-redis:
    image: redis:8
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - messenger-network
  
  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    depends_on:
      auth-db:
        condition: service_healthy
      auth-redis:
        condition: service_healthy
      vault:
        condition: service_healthy
      user-service:
        condition: service_started
    environment:
      DB_CONNECTION_STRING: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@auth-db:5432/postgres?sslmode=disable
      MIGRATE_NEED_TO_MIGRATE: true
      REDIS_ADDRESS: auth-redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VAULT_TOKEN: ${VAULT_TOKEN}
      VAULT_ADDRESS: http://vault:8200
      VAULT_ENABLE: true
      JWT_ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET}
      JWT_REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET}
      USER_SERVICE_GRPC_CLIENT_ADDRESS: user-service:50051
    volumes:
      - ./backend/configs/auth-service:/etc/auth-service
    ports:
      - "50052:50051"
    networks:
      - messenger-network

volumes:
  # old-messenger-db:
  user-db-data:
  auth-db-data:

networks:
  messenger-network:
    driver: bridge